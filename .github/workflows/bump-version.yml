name: Bump Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: "New version (e.g. 2.0.1 or 3.8.4)"
        required: true
        type: string

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Validate version format
        run: |
          if ! echo "${{ github.event.inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid version: ${{ github.event.inputs.version }} — expected MAJOR.MINOR.PATCH"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Update all latest.json files
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          BASE="https://github.com/loophole-ai/loophole-ide/releases/download/${VERSION}"
          update() {
            jq --arg v "$VERSION" --arg u "$2" '.version=$v | .productVersion=$v | .url=$u' "$1" > "$1.tmp" && mv "$1.tmp" "$1"
            echo "updated $1"
          }
          update "oss/darwin/x64/latest.json"         "${BASE}/Loophole.x64.${VERSION}.dmg"
          update "oss/darwin/arm64/latest.json"       "${BASE}/Loophole.arm64.${VERSION}.dmg"
          update "oss/linux/x64/latest.json"          "${BASE}/Loophole-linux-x64-${VERSION}.tar.gz"
          update "oss/linux/arm64/latest.json"        "${BASE}/Loophole-linux-arm64-${VERSION}.tar.gz"
          update "oss/win32/x64/user/latest.json"     "${BASE}/LoopholeUserSetup-x64-${VERSION}.exe"
          update "oss/win32/x64/system/latest.json"   "${BASE}/LoopholeSetup-x64-${VERSION}.exe"
          update "oss/win32/arm64/user/latest.json"   "${BASE}/LoopholeUserSetup-arm64-${VERSION}.exe"
          update "oss/win32/arm64/system/latest.json" "${BASE}/LoopholeSetup-arm64-${VERSION}.exe"

      - name: Push branch and open PR
        env:
          VERSION: ${{ github.event.inputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
        run: |
          BRANCH="release/${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add oss/
          git commit -m "chore: bump all latest.json to v${VERSION}"
          git push origin "$BRANCH"

          PR_BODY="Version bump to ${VERSION} — updates all 8 latest.json files (macOS x64/arm64, Linux x64/arm64, Windows x64 user/system, Windows arm64 user/system). Triggered by @${ACTOR}"

          gh pr create --title "Release v${VERSION}" --body "$PR_BODY" --base main --head "$BRANCH" --label release
